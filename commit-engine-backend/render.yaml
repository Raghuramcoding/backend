databases:
  - name: commit-engine-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: commit-engine-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: commit-engine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://raghuramcoding.github.io
    healthCheckPath: /health
